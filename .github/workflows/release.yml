name: Build and Release Solver

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to build and tag (leave empty for HEAD)"
        required: false
      tag_name:
        description: "Release tag (e.g. 1.0.0)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install dependencies via vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: true
          vcpkgDirectory: '${{ github.workspace }}/.vcpkg'

      - name: Install LLVM/Clang 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          clang++-22 --version
          echo "#include <flat_map>" | clang++-22 -std=c++23 -stdlib=libc++ -x c++ - -fsyntax-only && echo "flat_map OK" || echo "flat_map NOT FOUND"

      - name: Configure CMake
        run: >
          cmake -DENABLE_DOCS=OFF -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=clang++-22
          -DCMAKE_C_COMPILER=clang-22
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --target build_solver_and_run_tests

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: "Release ${{ github.event.inputs.tag_name }}"
          files: |
            build/bin/sudoku_solver
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_PAT }}